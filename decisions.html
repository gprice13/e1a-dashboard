<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E1a Decisions Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f1f5f9;
    color: #1a1a1a;
    line-height: 1.5;
    padding: 24px;
    min-height: 100vh;
  }

  /* ── Header ── */
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 20px;
  }
  .page-header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .page-header .subtitle {
    font-size: 13px;
    color: #64748b;
    font-weight: 400;
  }
  .meta-row {
    font-size: 12px;
    color: #94a3b8;
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .meta-row .count { font-weight: 600; color: #475569; }

  /* ── Controls ── */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    margin-bottom: 16px;
  }
  .search-box {
    flex: 1 1 260px;
    max-width: 360px;
    padding: 8px 14px;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: #fff;
    color: #1a1a1a;
    outline: none;
    transition: border-color .15s;
  }
  .search-box::placeholder { color: #94a3b8; }
  .search-box:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.12); }

  .filter-group {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .filter-btn {
    padding: 5px 14px;
    border: 1px solid #e5e7eb;
    border-radius: 20px;
    background: #fff;
    font-size: 12px;
    font-family: inherit;
    font-weight: 500;
    color: #475569;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .filter-btn:hover { background: #f8fafc; border-color: #cbd5e1; }
  .filter-btn.active {
    background: #1e293b;
    color: #fff;
    border-color: #1e293b;
  }

  /* ── Table ── */
  .table-wrap {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    overflow-x: auto;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 960px;
  }
  thead th {
    position: sticky;
    top: 0;
    background: #f8fafc;
    border-bottom: 2px solid #e5e7eb;
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: #64748b;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: #1e293b; }
  thead th .sort-arrow {
    display: inline-block;
    margin-left: 4px;
    font-size: 10px;
    opacity: .35;
    transition: opacity .15s;
  }
  thead th.sorted .sort-arrow { opacity: 1; color: #6366f1; }

  tbody tr { transition: background .1s; }
  tbody tr:nth-child(even) { background: #fafbfc; }
  tbody tr:hover { background: #f1f5f9; }
  tbody td {
    padding: 10px 14px;
    font-size: 13px;
    border-bottom: 1px solid #f1f5f9;
    vertical-align: top;
  }
  tbody td:first-child {
    font-weight: 600;
    color: #94a3b8;
    width: 48px;
    text-align: center;
  }
  tbody td.decision-col {
    font-weight: 500;
    max-width: 320px;
  }
  tbody td.notes-col {
    color: #64748b;
    max-width: 260px;
    font-size: 12px;
  }
  tbody td.date-col {
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    font-size: 12px;
    color: #475569;
  }

  /* ── Status Badges ── */
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .2px;
    white-space: nowrap;
    line-height: 1.6;
  }
  .badge--decided      { background: #dcfce7; color: #15803d; }
  .badge--open         { background: #fef9c3; color: #a16207; }
  .badge--blocked      { background: #fee2e2; color: #b91c1c; }
  .badge--in-progress  { background: #e0e7ff; color: #4338ca; }
  .badge--investigating{ background: #ffedd5; color: #c2410c; }
  .badge--planned      { background: #f3e8ff; color: #7e22ce; }
  .badge--deferred     { background: #f1f5f9; color: #64748b; }
  .badge--at-risk      { background: #fee2e2; color: #b91c1c; }
  .badge--unknown      { background: #f1f5f9; color: #94a3b8; }

  /* ── Loading / Error ── */
  .state-msg {
    text-align: center;
    padding: 64px 24px;
  }
  .state-msg h2 { font-size: 18px; margin-bottom: 8px; }
  .state-msg p { color: #64748b; font-size: 14px; margin-bottom: 16px; }
  .retry-btn {
    padding: 8px 20px;
    border: none;
    border-radius: 8px;
    background: #6366f1;
    color: #fff;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .retry-btn:hover { background: #4f46e5; }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #e5e7eb;
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Empty state ── */
  .empty-row td {
    text-align: center;
    padding: 40px 14px;
    color: #94a3b8;
    font-size: 14px;
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    body { padding: 12px; }
    .page-header h1 { font-size: 18px; }
    .search-box { max-width: 100%; }
  }
</style>
</head>
<body>

<div class="page-header">
  <div>
    <h1>Decisions Tracker <span class="subtitle">— E1a Solo Station</span></h1>
  </div>
  <div class="meta-row">
    <span id="rowCount"></span>
    <span id="lastUpdated"></span>
  </div>
</div>

<div class="controls">
  <input type="text" class="search-box" id="searchInput" placeholder="Search decisions…">
  <div class="filter-group" id="filterGroup">
    <button class="filter-btn active" data-status="All">All</button>
    <button class="filter-btn" data-status="Open">Open</button>
    <button class="filter-btn" data-status="Decided">Decided</button>
    <button class="filter-btn" data-status="In Progress">In Progress</button>
    <button class="filter-btn" data-status="Blocked">Blocked</button>
    <button class="filter-btn" data-status="Investigating">Investigating</button>
    <button class="filter-btn" data-status="Planned">Planned</button>
    <button class="filter-btn" data-status="Deferred">Deferred</button>
    <button class="filter-btn" data-status="At Risk">At Risk</button>
  </div>
</div>

<div class="table-wrap" id="tableWrap">
  <div class="state-msg" id="loadingMsg">
    <div class="spinner"></div>
    <p>Loading decisions from Google Sheets…</p>
  </div>
</div>

<script>
var DECISIONS_DATA = [
  {
    "#": "1",
    "Decision": "Board ID exhaustion - CDT vs HW-based",
    "Status": "Open",
    "DRI": "Zac Crosby",
    "Date Opened": "2026-04-09",
    "Date Decided": "",
    "Impact Area": "SQUID",
    "Notes": "Almost out of HW product IDs. 2 E1a SKUs + T2c = 0 remaining."
  },
  {
    "#": "2",
    "Decision": "Pre-dev-build SW strategy",
    "Status": "Open",
    "DRI": "Zac Crosby",
    "Date Opened": "2026-04-01",
    "Date Decided": "",
    "Impact Area": "SQUID",
    "Notes": "How to make E1a builds work for multiple HW targets"
  },
  {
    "#": "3",
    "Decision": "X2c MLB fork timing",
    "Status": "Blocked",
    "DRI": "Cory Douthat / Tom Buttner",
    "Date Opened": "2026-03-01",
    "Date Decided": "",
    "Impact Area": "SQUID / EE",
    "Notes": "Blocked on X2c discrete memory qual completing first"
  },
  {
    "#": "4",
    "Decision": "MPoC for E1a",
    "Status": "Deferred",
    "DRI": "Zac Crosby",
    "Date Opened": "2026-03-15",
    "Date Decided": "",
    "Impact Area": "SQUID",
    "Notes": "Not required now. Standard secure PIN solution."
  },
  {
    "#": "5",
    "Decision": "NFC architecture - Path 2",
    "Status": "Decided",
    "DRI": "John Reimers / Ben Brown",
    "Date Opened": "2026-03-01",
    "Date Decided": "2026-03-20",
    "Impact Area": "ESW / EE",
    "Notes": "Circuitry on SPE board. ID confirming concept 4/15."
  },
  {
    "#": "6",
    "Decision": "SPE MCO reuse from K1",
    "Status": "Decided",
    "DRI": "Ben Brown",
    "Date Opened": "2026-03-11",
    "Date Decided": "2026-03-15",
    "Impact Area": "ESW",
    "Notes": "Reduces ESW effort"
  },
  {
    "#": "7",
    "Decision": "USB PD controller selection",
    "Status": "In Progress",
    "DRI": "Charles Guan / Tom Buttner",
    "Date Opened": "2026-02-01",
    "Date Decided": "",
    "Impact Area": "SQUID / EE",
    "Notes": "MPS vs Maxim eval. Franken-proto bring-up underway. EE-7360"
  },
  {
    "#": "8",
    "Decision": "NFC VDDP voltage issue",
    "Status": "Investigating",
    "DRI": "Ben Brown",
    "Date Opened": "2026-03-20",
    "Date Decided": "",
    "Impact Area": "ESW",
    "Notes": "X2c bug, retry configurable per-product for E1a"
  },
  {
    "#": "9",
    "Decision": "Bluetooth requirement",
    "Status": "Decided",
    "DRI": "Greg Fulco",
    "Date Opened": "2026-03-01",
    "Date Decided": "2026-03-15",
    "Impact Area": "SQUID",
    "Notes": "Not required. No SW framework for BT with PCI devices."
  },
  {
    "#": "10",
    "Decision": "No built-in swipe",
    "Status": "Decided",
    "DRI": "Alice Yen",
    "Date Opened": "2026-04-01",
    "Date Decided": "2026-04-14",
    "Impact Area": "EE / ESW",
    "Notes": "R42 USB-C accessory instead. Reduces SW complexity."
  },
  {
    "#": "11",
    "Decision": "OOBE / Tap-to-Set-Up",
    "Status": "Planned",
    "DRI": "John Koryfidis",
    "Date Opened": "2026-02-04",
    "Date Decided": "",
    "Impact Area": "SPA",
    "Notes": "Q2 bandwidth after K1 Alpha"
  },
  {
    "#": "12",
    "Decision": "Check reopen without Stand",
    "Status": "Open",
    "DRI": "TBD",
    "Date Opened": "2026-04-01",
    "Date Decided": "",
    "Impact Area": "SPA",
    "Notes": "E1a is forcing function per James Schonzeit"
  },
  {
    "#": "13",
    "Decision": "ES1 to ES2 logging migration",
    "Status": "At Risk",
    "DRI": "TBD",
    "Date Opened": "2026-04-01",
    "Date Decided": "",
    "Impact Area": "SQUID",
    "Notes": "ES1 deprecated Aug 21. Ford Peprah flagged debugging gap."
  }
];

(function () {
  /* ── Config ── */
  const SHEET_ID  = '1CS1v8ZKjElIqd4_OZvsDCoYdYB7DpGZ2FVAx_A-qcQQ';
  const SHEET_TAB = 'Decisions';
  const DATA_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_TAB)}`;

  const STATUS_COLORS = {
    'decided':       'decided',
    'open':          'open',
    'blocked':       'blocked',
    'in progress':   'in-progress',
    'investigating': 'investigating',
    'planned':       'planned',
    'deferred':      'deferred',
    'at risk':       'at-risk',
  };

  /* Column order we expect (maps to header labels) */
  const COL_KEYS = ['num','decision','status','dri','dateOpened','dateDecided','impactArea','notes'];

  let allRows = [];
  let activeFilter = 'All';
  let sortCol = -1;
  let sortAsc = true;

  /* ── DOM refs ── */
  const tableWrap   = document.getElementById('tableWrap');
  const loadingMsg  = document.getElementById('loadingMsg');
  const searchInput = document.getElementById('searchInput');
  const filterGroup = document.getElementById('filterGroup');
  const rowCountEl  = document.getElementById('rowCount');
  const lastUpdEl   = document.getElementById('lastUpdated');

  /* ── Fetch ── */
  function fetchData() {
    // Using embedded data (synced from Google Sheet by Goose)
    loadingMsg.style.display = 'none';
    allRows = DECISIONS_DATA.map(function(r) {
      return {
        num: r['#'] || '',
        decision: r['Decision'] || '',
        status: r['Status'] || '',
        dri: r['DRI'] || '',
        dateOpened: r['Date Opened'] || '',
        dateDecided: r['Date Decided'] || '',
        impactArea: r['Impact Area'] || '',
        notes: r['Notes'] || ''
      };
    });
    renderTable();
    rowCountEl.textContent = 'Showing ' + allRows.length + ' of ' + allRows.length + ' decisions';
  }

  /* ── Process ── */
  function processData(table) {
    loadingMsg.style.display = 'none';

    const cols = table.cols || [];
    const rows = table.rows || [];

    allRows = rows.map((r, idx) => {
      const cells = r.c || [];
      return COL_KEYS.reduce((obj, key, i) => {
        const cell = cells[i];
        if (!cell) { obj[key] = ''; return obj; }
        // Dates come as "Date(y,m,d)" or formatted value
        if (cell.f) obj[key] = cell.f;
        else if (cell.v != null) obj[key] = String(cell.v);
        else obj[key] = '';
        return obj;
      }, {});
    });

    lastUpdEl.textContent = 'Updated ' + new Date().toLocaleTimeString();
    buildTable();
  }

  /* ── Build table ── */
  function buildTable() {
    const oldTable = tableWrap.querySelector('table');
    if (oldTable) oldTable.remove();

    const table = document.createElement('table');
    table.innerHTML = `
      <thead><tr>
        <th data-col="0"># <span class="sort-arrow">▲</span></th>
        <th data-col="1">Decision <span class="sort-arrow">▲</span></th>
        <th data-col="2">Status <span class="sort-arrow">▲</span></th>
        <th data-col="3">DRI <span class="sort-arrow">▲</span></th>
        <th data-col="4">Date Opened <span class="sort-arrow">▲</span></th>
        <th data-col="5">Date Decided <span class="sort-arrow">▲</span></th>
        <th data-col="6">Impact Area <span class="sort-arrow">▲</span></th>
        <th data-col="7">Notes <span class="sort-arrow">▲</span></th>
      </tr></thead>
      <tbody></tbody>`;

    tableWrap.appendChild(table);

    // Sort click
    table.querySelectorAll('thead th').forEach(th => {
      th.addEventListener('click', () => {
        const col = parseInt(th.dataset.col);
        if (sortCol === col) sortAsc = !sortAsc;
        else { sortCol = col; sortAsc = true; }
        renderRows();
        // Visual
        table.querySelectorAll('thead th').forEach(h => h.classList.remove('sorted'));
        th.classList.add('sorted');
        th.querySelector('.sort-arrow').textContent = sortAsc ? '▲' : '▼';
      });
    });

    renderRows();
  }

  /* ── Render rows ── */
  function renderRows() {
    const tbody = tableWrap.querySelector('tbody');
    if (!tbody) return;
    tbody.innerHTML = '';

    const query = searchInput.value.trim().toLowerCase();

    let filtered = allRows.filter(row => {
      // Status filter
      if (activeFilter !== 'All') {
        if ((row.status || '').toLowerCase() !== activeFilter.toLowerCase()) return false;
      }
      // Search filter
      if (query) {
        const hay = COL_KEYS.map(k => (row[k] || '').toLowerCase()).join(' ');
        if (!hay.includes(query)) return false;
      }
      return true;
    });

    // Sort
    if (sortCol >= 0) {
      const key = COL_KEYS[sortCol];
      filtered.sort((a, b) => {
        let va = (a[key] || '').toLowerCase();
        let vb = (b[key] || '').toLowerCase();
        // Try numeric
        const na = parseFloat(va), nb = parseFloat(vb);
        if (!isNaN(na) && !isNaN(nb)) return sortAsc ? na - nb : nb - na;
        return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
      });
    }

    rowCountEl.innerHTML = `<span class="count">${filtered.length}</span> of ${allRows.length} decisions`;

    if (filtered.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="8">No decisions match your filters.</td></tr>';
      return;
    }

    const frag = document.createDocumentFragment();
    filtered.forEach(row => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${esc(row.num)}</td>
        <td class="decision-col">${esc(row.decision)}</td>
        <td>${statusBadge(row.status)}</td>
        <td>${esc(row.dri)}</td>
        <td class="date-col">${esc(row.dateOpened)}</td>
        <td class="date-col">${esc(row.dateDecided)}</td>
        <td>${esc(row.impactArea)}</td>
        <td class="notes-col">${esc(row.notes)}</td>`;
      frag.appendChild(tr);
    });
    tbody.appendChild(frag);
  }

  /* ── Helpers ── */
  function esc(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function statusBadge(status) {
    if (!status) return '';
    const key = status.toLowerCase().trim();
    const cls = STATUS_COLORS[key] || 'unknown';
    return `<span class="badge badge--${cls}">${esc(status)}</span>`;
  }

  function showError(msg) {
    loadingMsg.style.display = 'none';
    const div = document.createElement('div');
    div.className = 'state-msg error';
    div.innerHTML = `
      <h2>Unable to load decisions</h2>
      <p>${esc(msg)}</p>
      <button class="retry-btn" id="retryBtn">Retry</button>`;
    tableWrap.appendChild(div);
    document.getElementById('retryBtn').addEventListener('click', fetchData);
  }

  /* ── Events ── */
  searchInput.addEventListener('input', renderRows);

  filterGroup.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    filterGroup.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.status;
    renderRows();
  });

  /* ── Init ── */
  fetchData();
})();
</script>
</body>
</html>
