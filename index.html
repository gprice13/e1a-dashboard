<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0f172a;--card:#1e293b;--card-hover:#263548;--text:#e2e8f0;--text-muted:#94a3b8;
--border:#334155;--accent:#3b82f6;--green:#22c55e;--yellow:#eab308;--red:#ef4444;
--gray:#6b7280;--purple:#a855f7;--orange:#f97316;--blue:#3b82f6;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;display:flex;flex-direction:column}

.header{background:#0b1120;border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-left{display:flex;flex-direction:column;gap:2px}
.header-title{font-size:20px;font-weight:700;letter-spacing:-0.3px}
.header-subtitle{font-size:12px;color:var(--text-muted);font-weight:500}
.header-right{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--text-muted)}
.header-right a{color:var(--accent);text-decoration:none;font-size:12px}
.header-right a:hover{text-decoration:underline}
.last-updated{font-size:11px;color:var(--text-muted);white-space:nowrap}
.refresh-btn{background:linear-gradient(135deg,#3b82f6,#2563eb);border:none;color:#fff;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:600;display:flex;align-items:center;gap:8px;transition:all .2s;box-shadow:0 2px 8px rgba(59,130,246,.3);white-space:nowrap}
.refresh-btn:hover{background:linear-gradient(135deg,#60a5fa,#3b82f6);box-shadow:0 4px 12px rgba(59,130,246,.4);transform:translateY(-1px)}
.refresh-btn:active{transform:translateY(0)}
.refresh-btn.spinning .spin-icon{animation:spin 1s linear infinite}
.refresh-btn.loading{opacity:.8;pointer-events:none}
@keyframes spin{to{transform:rotate(360deg)}}

.nav{background:#0b1120;border-bottom:1px solid var(--border);display:flex;gap:0;padding:0 24px;flex-shrink:0}
.nav-tab{padding:10px 20px;font-size:13px;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;user-select:none}
.nav-tab:hover{color:var(--text);background:rgba(255,255,255,.03)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.main{flex:1;overflow-y:auto;padding:20px 24px}
.page{display:none}
.page.active{display:block}

.loading-container,.error-container{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.error-container{color:var(--red)}
.error-container p{color:var(--text-muted);font-size:14px;text-align:center;max-width:400px}
.retry-btn{background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600}
.retry-btn:hover{opacity:.9}

.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,23,42,.7);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;backdrop-filter:blur(2px);transition:opacity .3s}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-overlay .spinner{width:48px;height:48px;border-width:4px}
.loading-overlay .loading-text{font-size:15px;color:var(--text);font-weight:600}
.loading-overlay .loading-sub{font-size:12px;color:var(--text-muted)}

/* HOME */
.home-layout{display:flex;gap:24px}
.home-main{flex:1;min-width:0}
.home-sidebar{width:300px;flex-shrink:0}
.cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.status-card{border-radius:10px;padding:18px;border-left:4px solid;background:var(--card);transition:transform .15s,box-shadow .15s}
.status-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.status-card .card-section{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;opacity:.7}
.status-card .card-title{font-size:15px;font-weight:700;margin-bottom:6px}
.status-card .card-summary{font-size:13px;color:var(--text-muted);line-height:1.5}
.status-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:8px}

.sidebar-section{margin-bottom:20px}
.sidebar-section h3{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.sidebar-link{display:block;padding:6px 0;text-decoration:none;color:var(--text);font-size:13px;transition:color .2s;position:relative}
.sidebar-link:hover{color:var(--accent)}
.sidebar-link .link-desc{display:none;position:absolute;left:0;top:100%;background:#0b1120;border:1px solid var(--border);padding:8px 12px;border-radius:6px;font-size:11px;color:var(--text-muted);z-index:100;width:250px;line-height:1.4;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.sidebar-link:hover .link-desc{display:block}
.quick-links-panel{background:var(--card);border-radius:10px;padding:18px;border:1px solid var(--border)}
.quick-links-panel h2{font-size:15px;font-weight:700;margin-bottom:16px}

/* TABLES */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:6px;font-size:13px;font-family:inherit;width:280px;transition:border-color .2s}
.search-input:focus{outline:none;border-color:var(--accent)}
.search-input::placeholder{color:var(--text-muted)}
.filter-btn{background:var(--card);border:1px solid var(--border);color:var(--text-muted);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.filter-btn:hover{background:var(--card-hover);color:var(--text)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.summary-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.summary-chip{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;display:flex;flex-direction:column;align-items:center;min-width:90px;transition:transform .15s}
.summary-chip:hover{transform:translateY(-2px)}
.summary-chip .chip-count{font-size:22px;font-weight:700}
.summary-chip .chip-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;font-weight:600;letter-spacing:.3px;margin-top:2px}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table thead th{background:#0b1120;padding:10px 12px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:5;cursor:pointer;user-select:none;white-space:nowrap}
.data-table thead th:hover{color:var(--text);background:#131d30}
.data-table thead th .sort-arrow{margin-left:4px;font-size:10px;opacity:.5}
.data-table thead th.sort-active .sort-arrow{opacity:1;color:var(--accent)}
.data-table tbody tr{border-bottom:1px solid rgba(51,65,85,.3);transition:background .15s}
.data-table tbody tr:nth-child(even){background:rgba(30,41,59,.5)}
.data-table tbody tr:hover{background:rgba(59,130,246,.08)}
.data-table tbody tr.row-alert{background:rgba(239,68,68,.08)}
.data-table tbody tr.row-alert:hover{background:rgba(239,68,68,.12)}
.data-table td{padding:10px 12px;vertical-align:top;line-height:1.4}
.badge{display:inline-block;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.badge-green{background:rgba(34,197,94,.15);color:var(--green)}
.badge-yellow{background:rgba(234,179,8,.15);color:var(--yellow)}
.badge-red{background:rgba(239,68,68,.15);color:var(--red)}
.badge-blue{background:rgba(59,130,246,.15);color:var(--blue)}
.badge-gray{background:rgba(107,114,128,.15);color:var(--gray)}
.badge-purple{background:rgba(168,85,247,.15);color:var(--purple)}
.badge-orange{background:rgba(249,115,22,.15);color:var(--orange)}
.table-scroll{overflow:auto;max-height:calc(100vh - 300px);border-radius:8px;border:1px solid var(--border)}

.fn-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.fn-SQUID{background:rgba(59,130,246,.15);color:#60a5fa}
.fn-ESW{background:rgba(34,197,94,.15);color:#4ade80}
.fn-SPA{background:rgba(168,85,247,.15);color:#c084fc}
.fn-EE{background:rgba(249,115,22,.15);color:#fb923c}
.fn-Program{background:rgba(234,179,8,.15);color:#fbbf24}
.fn-default{background:rgba(107,114,128,.15);color:#9ca3af}

.no-data{text-align:center;padding:40px;color:var(--text-muted);font-size:14px}

.row-counter{margin-top:12px;font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.row-counter .count-badge{background:var(--card);border:1px solid var(--border);padding:2px 10px;border-radius:4px;font-weight:700;color:var(--accent)}

/* Workstream color stripe for timeline */
.ws-stripe{display:inline-block;width:4px;height:18px;border-radius:2px;margin-right:8px;vertical-align:middle;flex-shrink:0}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#475569}
</style>

  <script type="application/x-goose-prd">
Build a program dashboard app called "E1a Solo Station Dashboard" (1440x900) that reads ALL data from a published Google Sheet.

## DATA SOURCE
Google Sheet ID: 1CS1v8ZKjElIqd4_OZvsDCoYdYB7DpGZ2FVAx_A-qcQQ

Fetch data using this URL pattern for each tab:
https://docs.google.com/spreadsheets/d/1CS1v8ZKjElIqd4_OZvsDCoYdYB7DpGZ2FVAx_A-qcQQ/gviz/tq?tqx=out:json&sheet=SHEET_NAME

The response is JSONP — strip the prefix and trailing characters to get JSON. Then parse response.table.cols and response.table.rows. ALL rows must be preserved — only completely empty rows are skipped.

## REFRESH FUNCTIONALITY
- Prominent "🔄 Refresh Data" button in the header, always visible on every tab
- Blue gradient button with shadow for high visibility
- Shows a full-screen loading overlay with spinner while fetching
- Displays "Last refreshed: [HH:MM:SS]" timestamp next to the button
- Button shows spinning animation during refresh
- Prevents double-click during active refresh

## TABS / PAGES (navigation bar at top)

### 1. HOME (default)
Read from "Status Cards" sheet (columns: Section, Status, Title, Summary).
- Display as cards in a 2-column grid
- Card color based on Status column: Green=#22c55e, Yellow=#eab308, Red=#ef4444, Gray=#6b7280
- Each card shows Section label, Status badge, Title (bold) and Summary text
- Cards have hover effect (lift + shadow)
- Row counter at bottom showing total cards loaded
- RIGHT SIDEBAR: Read from "Quick Links" sheet (columns: Category, Name, URL, Description)
  - Group links by Category
  - Each link is clickable, opens in new tab
  - Show Description as tooltip on hover

### 2. TIMELINE (SORTABLE TABLE — replaces Gantt)
Read from "Timeline" sheet (columns: Workstream, Milestone, Start Date, End Date, Status, DRI, Notes, Source).
- **PRIMARY VIEW: Sortable table showing ALL rows** (no Gantt chart)
- Must display EVERY row from the sheet — no filtering, no truncation
- Status summary chips at top showing counts per status
- Filter by Workstream: dynamically generated buttons (All + unique workstreams)
- Search box to filter across all columns
- Sortable by clicking any column header (toggle asc/desc)
- Status column color-coded: Complete=green, In Progress=blue, Open=yellow, Investigating=orange, Blocked=red, Not Started=gray, Planned=purple, Decided=green
- Workstream column has colored stripe indicator
- Blocked rows highlighted with subtle red background
- **Row counter at bottom**: "Rows loaded: N total from sheet | Showing: M"
- Date columns displayed as-is from the sheet (no date reformatting)

### 3. DRIs
Read from "DRIs" sheet (columns: Name, Function, Role, Focus Area, Slack Handle, Email).
- Searchable/filterable sortable table
- Search box with 🔍 icon that filters across all columns
- Filter buttons by Function (dynamically generated): All + unique functions
- Sortable by clicking column headers
- Function column has colored badges (SQUID=blue, ESW=green, SPA=purple, EE=orange, Program=yellow)
- Row counter at bottom
- "No matching DRIs found" message when filters return empty

### 4. DECISIONS
Read from "Decisions" sheet (columns: #, Decision, Status, DRI, Date Opened, Date Decided, Impact Area, Notes).
- Summary bar at top: count of each status
- Filterable by Status (buttons)
- Searchable with 🔍 icon
- Sortable by clicking column headers
- Table with status badges: Decided=green, Open=yellow, Blocked=red, In Progress=blue, At Risk=red, Deferred=gray, Planned=purple, Investigating=orange
- Highlight rows where Status is "Blocked" or "At Risk" with subtle red background
- Row counter at bottom
- "No matching decisions found" message when filters return empty

### 5. DEPENDENCIES
Read from "Dependencies" sheet (columns: #, From, To, Dependency, Type, Status, Risk Level, DRI, Notes).
- Summary cards at top: count by Risk Level (High, Medium, Low)
- Filter by Type (dynamically generated): All + unique types
- Filter by Risk Level: All, High, Medium, Low
- Sortable by clicking column headers
- Table with risk level badges: High=red, Medium=yellow, Low=green
- Highlight high-risk rows with subtle red background
- Row counter at bottom
- "No matching dependencies found" message when filters return empty

## DATA INTEGRITY
- ALL rows from every sheet must be displayed — no data dropped
- Row counters on every tab to verify data completeness
- Console logging of row counts per sheet for debugging
- Only completely empty rows (no values in any column) are skipped
- Promise.allSettled ensures individual tab errors don't block other tabs

## ERROR HANDLING
- If any sheet fails to load, show a friendly error message with ⚠️ icon on that specific tab
- Error message includes description of what went wrong
- "🔄 Retry" button on each error state
- Individual tab errors don't block other tabs from loading
- Console warnings for failed sheet fetches

## DESIGN
- Dark theme (#0f172a background, #1e293b cards, #e2e8f0 text)
- Clean, modern, professional
- Inter font from Google Fonts
- Navigation: horizontal tab bar at top with active tab indicator (blue underline)
- Full-screen loading overlay with backdrop blur during refresh
- All tables are sortable with visual sort indicators (arrows)
- Custom scrollbar styling
- All data comes from the sheet — NO hardcoded data

## HEADER
- Title: "E1a Solo Station Dashboard"
- Subtitle: "Program Status — Architecture Phase"
- Right side: Last refreshed timestamp, "📊 Google Sheet ↗" link, prominent blue "🔄 Refresh Data" button

// DATA LOADING — uses embedded data (synced from Google Sheet)
function loadEmbeddedData() {
  return new Promise(function(resolve) {
    resolve(EMBEDDED_DATA);
  });
}

function showLoading(pageId) {
  document.getElementById(pageId).innerHTML = '<div class="loading-container"><div class="spinner"></div><div style="color:var(--text-muted);font-size:14px">Loading data…</div></div>';
}

function showError(pageId, msg) {
  document.getElementById(pageId).innerHTML = '<div class="error-container"><div style="font-size:36px">⚠️</div><p><strong>Failed to load data</strong></p><p>' + esc(msg) + '</p><button class="retry-btn" onclick="refreshAll()">🔄 Retry</button></div>';
}

function showOverlay(show) {
  var overlay = document.getElementById('loadingOverlay');
  if (show) overlay.classList.remove('hidden');
  else overlay.classList.add('hidden');
}

function updateLoadingStatus(msg) {
  document.getElementById('loadingStatus').textContent = msg;
}

function refreshAll() {
  if (isRefreshing) return;
  isRefreshing = true;

  var btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning', 'loading');
  showOverlay(true);
  updateLoadingStatus('Fetching from Google Sheets…');

  ['page-home','page-timeline','page-dris','page-decisions','page-dependencies'].forEach(function(p) { showLoading(p); });

  loadEmbeddedData().then(function(data) {
    allData = data;
    var fetchErrors = [];

    updateLoadingStatus('Rendering dashboard…');

    renderHome();
    renderTimeline();
    renderDRIs();
    renderDecisions();
    renderDependencies();

    var now = new Date();
    var timeStr = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    document.getElementById('lastUpdated').textContent = 'Last refreshed: ' + timeStr;

    if (fetchErrors.length > 0) {
      console.warn('Failed to load sheets:', fetchErrors);
    }

    btn.classList.remove('spinning', 'loading');
    isRefreshing = false;
    setTimeout(function() { showOverlay(false); }, 300);
  }).catch(function(e) {
    console.error('Refresh error:', e);
    ['page-home','page-timeline','page-dris','page-decisions','page-dependencies'].forEach(function(p) {
      showError(p, 'Failed to load data. Check your network connection and that the Google Sheet is published/accessible.');
    });
    btn.classList.remove('spinning', 'loading');
    isRefreshing = false;
    setTimeout(function() { showOverlay(false); }, 300);
  });
}

var timelineStatusColors = {
  'Complete':'green','Decided':'green',
  'In Progress':'blue',
  'Open':'yellow','Investigating':'orange',
  'Blocked':'red',
  'Not Started':'gray',
  'Planned':'purple'
};

var wsColors = {
  'Program':'#eab308','SQUID':'#3b82f6','ESW':'#22c55e',
  'SPA/Apps':'#a855f7','SPA':'#a855f7',
  'EE Dependency':'#f97316','EE':'#f97316'
};

function renderTimeline() {
  var page = document.getElementById('page-timeline');
  if (!allData.timeline) {
    showError('page-timeline', 'Could not load Timeline data. The "Timeline" sheet may be unavailable.');
    return;
  }

  var data = allData.timeline;

  // Parse all dates and find range
  var allDates = [];
  data.forEach(function(r) {
    var s = parseDate(r['Start Date'], r['_raw_Start Date']);
    var e = parseDate(r['End Date'], r['_raw_End Date']);
    if (s) allDates.push(s);
    if (e) allDates.push(e);
  });
  if (allDates.length === 0) { showError('page-timeline', 'No valid dates found in timeline data.'); return; }

  allDates.sort(function(a,b) { return a-b; });
  var minDate = new Date(allDates[0]);
  var maxDate = new Date(allDates[allDates.length - 1]);
  // Add padding: 1 month before and after
  minDate.setDate(1);
  maxDate.setMonth(maxDate.getMonth() + 2);
  maxDate.setDate(1);

  var totalDays = Math.ceil((maxDate - minDate) / 86400000);

  // Group by workstream, preserving order
  var wsOrder = ['Program','SQUID','ESW','SPA/Apps','EE Dependency'];
  var wsGroups = {};
  wsOrder.forEach(function(ws) { wsGroups[ws] = []; });
  data.forEach(function(r) {
    var ws = r['Workstream'] || 'Other';
    if (!wsGroups[ws]) { wsGroups[ws] = []; wsOrder.push(ws); }
    wsGroups[ws].push(r);
  });

  // Build month headers
  var months = [];
  var d = new Date(minDate);
  while (d < maxDate) {
    var mStart = new Date(d);
    var mEnd = new Date(d.getFullYear(), d.getMonth() + 1, 1);
    if (mEnd > maxDate) mEnd = maxDate;
    var mDays = Math.ceil((mEnd - mStart) / 86400000);
    var pctWidth = (mDays / totalDays * 100);
    var label = mStart.toLocaleString('en-US', { month: 'short', year: 'numeric' });
    months.push({ label: label, width: pctWidth });
    d = mEnd;
  }

  // Status colors for bars
  var barColors = {
    'Complete': '#22c55e', 'In Progress': '#3b82f6', 'Planned': '#a855f7',
    'Not Started': '#4b5563', 'Open': '#eab308', 'Blocked': '#ef4444',
    'Investigating': '#f97316', 'Decided': '#22c55e', 'Waiting': '#eab308'
  };

  // Legend
  var html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">';
  html += '<div style="font-size:16px;font-weight:700">☰ Program Timeline — E1a Solo Station</div>';
  html += '<div style="display:flex;gap:12px;flex-wrap:wrap">';
  ['Complete','In Progress','Not Started','Open','Blocked','Planned'].forEach(function(s) {
    html += '<div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-muted)">';
    html += '<span style="width:10px;height:10px;border-radius:2px;background:' + barColors[s] + ';display:inline-block"></span>' + s;
    html += '</div>';
  });
  html += '</div></div>';

  // Gantt container
  html += '<div style="background:var(--card);border-radius:10px;border:1px solid var(--border);overflow:hidden">';

  // Month header row
  html += '<div style="display:flex;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2;background:var(--card)">';
  html += '<div style="min-width:130px;max-width:130px;padding:8px 12px;font-size:12px;font-weight:600;color:var(--text-muted);border-right:1px solid var(--border);flex-shrink:0">Workstream</div>';
  html += '<div style="flex:1;display:flex">';
  months.forEach(function(m) {
    html += '<div style="width:' + m.width + '%;padding:8px 6px;font-size:11px;font-weight:600;color:var(--text-muted);border-right:1px solid rgba(51,65,85,0.5);text-align:center;white-space:nowrap;overflow:hidden">' + m.label + '</div>';
  });
  html += '</div></div>';

  // Swim lanes
  wsOrder.forEach(function(ws) {
    var items = wsGroups[ws];
    if (!items || items.length === 0) return;

    var wsColor = wsColors[ws] || '#6b7280';

    // Workstream header
    html += '<div style="display:flex;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02)">';
    html += '<div style="min-width:130px;max-width:130px;padding:10px 12px;font-size:13px;font-weight:700;color:var(--text);border-right:1px solid var(--border);display:flex;align-items:flex-start;flex-shrink:0">';
    html += '<span style="width:4px;height:16px;border-radius:2px;background:' + wsColor + ';margin-right:8px;margin-top:2px;flex-shrink:0"></span>' + esc(ws);
    html += '</div>';

    // Bars area
    html += '<div style="flex:1;position:relative;min-height:' + (items.length * 34 + 12) + 'px;padding:6px 0">';

    // Vertical month gridlines
    var gridLeft = 0;
    months.forEach(function(m) {
      html += '<div style="position:absolute;left:' + gridLeft + '%;top:0;bottom:0;border-right:1px solid rgba(51,65,85,0.3);width:0;z-index:0"></div>';
      gridLeft += m.width;
    });

    // Today line
    var today = new Date();
    if (today >= minDate && today <= maxDate) {
      var todayPct = ((today - minDate) / 86400000) / totalDays * 100;
      html += '<div style="position:absolute;left:' + todayPct + '%;top:0;bottom:0;width:2px;background:var(--accent);opacity:0.6;z-index:1" title="Today"></div>';
    }

    items.forEach(function(r, idx) {
      var startD = parseDate(r['Start Date'], r['_raw_Start Date']);
      var endD = parseDate(r['End Date'], r['_raw_End Date']);
      if (!startD) return;
      if (!endD) endD = new Date(startD.getTime() + 86400000); // 1 day default for milestones

      var isMilestone = (endD - startD) < 86400000 * 2; // Less than 2 days = milestone diamond

      var leftPct = ((startD - minDate) / 86400000) / totalDays * 100;
      var widthPct = Math.max(((endD - startD) / 86400000) / totalDays * 100, 0.5);
      var topPx = idx * 34 + 6;
      var status = r['Status'] || 'Not Started';
      var color = barColors[status] || '#4b5563';
      var milestone = r['Milestone'] || '';
      var dri = r['DRI'] || '';
      var notes = r['Notes'] || '';

      var tooltip = milestone + '\\n' + (r['Start Date'] || '') + ' → ' + (r['End Date'] || '') + '\\n' + status + (dri ? '\\nDRI: ' + dri : '') + (notes ? '\\n' + notes : '');

      if (isMilestone) {
        // Diamond marker for single-day milestones
        html += '<div style="position:absolute;left:' + leftPct + '%;top:' + topPx + 'px;z-index:2;cursor:pointer" title="' + esc(tooltip).replace(/"/g, '&quot;') + '">';
        html += '<div style="width:14px;height:14px;background:' + color + ';transform:rotate(45deg);border-radius:2px;margin-left:-7px"></div>';
        html += '</div>';
        // Label to the right of diamond
        html += '<div style="position:absolute;left:calc(' + leftPct + '% + 12px);top:' + (topPx - 1) + 'px;font-size:11px;color:var(--text);white-space:nowrap;z-index:2;pointer-events:none;max-width:200px;overflow:hidden;text-overflow:ellipsis">' + esc(milestone) + '</div>';
      } else {
        // Bar for date ranges
        html += '<div style="position:absolute;left:' + leftPct + '%;width:' + widthPct + '%;top:' + topPx + 'px;height:22px;z-index:2;cursor:pointer" title="' + esc(tooltip).replace(/"/g, '&quot;') + '">';
        html += '<div style="height:100%;background:' + color + ';border-radius:4px;opacity:0.85;min-width:4px;display:flex;align-items:center;padding:0 6px;overflow:hidden">';
        html += '<span style="font-size:10px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(milestone) + '</span>';
        html += '</div></div>';
      }
    });

    html += '</div></div>';
  });

  html += '</div>';

  // Row counter
  html += '<div class="row-counter" style="margin-top:8px">Showing <span class="count-badge">' + data.length + '</span> milestones across ' + wsOrder.filter(function(ws) { return wsGroups[ws] && wsGroups[ws].length > 0; }).length + ' workstreams</div>';

  page.innerHTML = html;
}

function setDRIFilter(btn, val) {
  activeFilters.dris = val;
  btn.closest('.filter-bar').querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  filterDRIs();
}

function sortDRIs(colIdx) {
  var st = sortState.dris;
  if (st.col === colIdx) st.asc = !st.asc;
  else { st.col = colIdx; st.asc = true; }
  filterDRIs();
}

function filterDRIs() {
  var body = document.getElementById('drisBody');
  if (!body || !allData.dris) return;
  var search = searchTerms.dris.toLowerCase();
  var fnFilter = activeFilters.dris;
  var driCols = ['Name','Function','Role','Focus Area','Slack Handle','Email'];

  var filtered = allData.dris.filter(function(r) {
    if (fnFilter !== 'All' && r['Function'] !== fnFilter) return false;
    if (search) {
      var all = '';
      for (var k in r) { if (k.indexOf('_raw_') !== 0) all += ' ' + r[k]; }
      if (all.toLowerCase().indexOf(search) === -1) return false;
    }
    return true;
  });

  // Sort
  var st = sortState.dris;
  if (st.col !== null) {
    var colName = driCols[st.col];
    filtered.sort(function(a, b) {
      var va = (a[colName] || '').toLowerCase();
      var vb = (b[colName] || '').toLowerCase();
      if (va < vb) return st.asc ? -1 : 1;
      if (va > vb) return st.asc ? 1 : -1;
      return 0;
    });
  }

  // Update sort arrows
  var ths = document.querySelectorAll('#drisTable thead th');
  ths.forEach(function(th, i) {
    th.classList.remove('sort-active');
    var arrow = th.querySelector('.sort-arrow');
    if (arrow) arrow.textContent = '⇅';
    if (st.col === i) { th.classList.add('sort-active'); if (arrow) arrow.textContent = st.asc ? '↑' : '↓'; }
  });

  var showingEl = document.getElementById('drisShowing');
  if (showingEl) showingEl.textContent = filtered.length;

  if (filtered.length === 0) {
    body.innerHTML = '<tr><td colspan="6" class="no-data">No matching DRIs found</td></tr>';
    return;
  }

  body.innerHTML = filtered.map(function(r) {
    var fn = r['Function'] || '';
    var fnClass = fn.indexOf('SPA') === 0 ? 'fn-SPA' : (['SQUID','ESW','EE','Program'].indexOf(fn) !== -1 ? 'fn-' + fn : 'fn-default');
    return '<tr>' +
      '<td><strong>' + esc(r['Name'] || '') + '</strong></td>' +
      '<td><span class="fn-badge ' + fnClass + '">' + esc(fn) + '</span></td>' +
      '<td>' + esc(r['Role'] || '') + '</td>' +
      '<td>' + esc(r['Focus Area'] || '') + '</td>' +
      '<td style="color:var(--accent)">' + esc(r['Slack Handle'] || '') + '</td>' +
      '<td>' + esc(r['Email'] || '') + '</td>' +
    '</tr>';
  }).join('');
}

  btn.closest('.filter-bar').querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  filterDecisions();
}

function sortDecisions(colIdx) {
  var st = sortState.decisions;
  if (st.col === colIdx) st.asc = !st.asc;
  else { st.col = colIdx; st.asc = true; }
  filterDecisions();
}

function filterDecisions() {
  var body = document.getElementById('decisionsBody');
  if (!body || !allData.decisions) return;
  var search = searchTerms.decisions.toLowerCase();
  var sFilter = activeFilters.decisionsStatus;
  var statusMap = { Decided:'green', Open:'yellow', Blocked:'red', 'In Progress':'blue', 'At Risk':'red', Deferred:'gray', Planned:'purple', Investigating:'orange' };
  var decCols = ['#','Decision','Status','DRI','Date Opened','Date Decided','Impact Area','Notes'];

  var filtered = allData.decisions.filter(function(r) {
    if (sFilter !== 'All' && r['Status'] !== sFilter) return false;
    if (search) {
      var all = '';
      for (var k in r) { if (k.indexOf('_raw_') !== 0) all += ' ' + r[k]; }
      if (all.toLowerCase().indexOf(search) === -1) return false;
    }
    return true;
  });

  // Sort
  var st = sortState.decisions;
  if (st.col !== null) {
    var colName = decCols[st.col];
    filtered.sort(function(a, b) {
      var va = a[colName] || '';
      var vb = b[colName] || '';
      if (colName === '#') {
        var na = parseInt(va) || 0;
        var nb = parseInt(vb) || 0;
        return st.asc ? na - nb : nb - na;
      }
      va = va.toLowerCase(); vb = vb.toLowerCase();
      if (va < vb) return st.asc ? -1 : 1;
      if (va > vb) return st.asc ? 1 : -1;
      return 0;
    });
  }

  var ths = document.querySelectorAll('#decisionsTable thead th');
  ths.forEach(function(th, i) {
    th.classList.remove('sort-active');
    var arrow = th.querySelector('.sort-arrow');
    if (arrow) arrow.textContent = '⇅';
    if (st.col === i) { th.classList.add('sort-active'); if (arrow) arrow.textContent = st.asc ? '↑' : '↓'; }
  });

  var showingEl = document.getElementById('decisionsShowing');
  if (showingEl) showingEl.textContent = filtered.length;

  if (filtered.length === 0) {
    body.innerHTML = '<tr><td colspan="8" class="no-data">No matching decisions found</td></tr>';
    return;
  }

  body.innerHTML = filtered.map(function(r) {
    var s = r['Status'] || '';
    var badge = statusMap[s] || 'gray';
    var isAlert = (s === 'Blocked' || s === 'At Risk');
    return '<tr class="' + (isAlert ? 'row-alert' : '') + '">' +
      '<td>' + esc(r['#'] || '') + '</td>' +
      '<td><strong>' + esc(r['Decision'] || '') + '</strong></td>' +
      '<td><span class="badge badge-' + badge + '">' + esc(s) + '</span></td>' +
      '<td>' + esc(r['DRI'] || '') + '</td>' +
      '<td style="white-space:nowrap">' + esc(r['Date Opened'] || '') + '</td>' +
      '<td style="white-space:nowrap">' + esc(r['Date Decided'] || '') + '</td>' +
      '<td>' + esc(r['Impact Area'] || '') + '</td>' +
      '<td style="max-width:200px;font-size:12px;color:var(--text-muted)">' + esc(r['Notes'] || '') + '</td>' +
    '</tr>';
  }).join('');
}

// ==================== DEPENDENCIES ====================
function renderDependencies() {
  var page = document.getElementById('page-dependencies');
  if (!allData.dependencies) { showError('page-dependencies', 'Could not load Dependencies data.'); return; }

  var data = allData.dependencies;
  var riskColors = { High:'red', Medium:'yellow', Low:'green' };
  var typeSet = {};
  data.forEach(function(r) { if (r['Type']) typeSet[r['Type']] = true; });
  var types = ['All'].concat(Object.keys(typeSet).sort());
  var risks = ['All','High','Medium','Low'];

  var riskCounts = { High:0, Medium:0, Low:0 };
  data.forEach(function(r) { var rl = r['Risk Level']; if (riskCounts[rl] !== undefined) riskCounts[rl]++; });

  var html = '<div class="summary-bar">';
  ['High','Medium','Low'].forEach(function(rl) {
    var color = riskColors[rl];
    html += '<div class="summary-chip"><span class="chip-count" style="color:var(--' + color + ')">' + riskCounts[rl] + '</span><span class="chip-label">' + rl + ' Risk</span></div>';
  });
  html += '</div>';

  html += '<div class="filter-bar">';
  html += '<input class="search-input" placeholder="🔍 Search dependencies…" oninput="searchTerms.dependencies=this.value;filterDeps()">';
  html += '<span style="font-size:11px;color:var(--text-muted);margin-left:8px">Type:</span>';
  types.forEach(function(t) {
    html += '<button class="filter-btn' + (t === 'All' ? ' active' : '') + '" data-filter-group="type" onclick="setDepFilter(this,\'type\',\'' + esc(t).replace(/'/g, "\\'") + '\')">' + esc(t) + '</button>';
  });
  html += '<span style="font-size:11px;color:var(--text-muted);margin-left:8px">Risk:</span>';
  risks.forEach(function(r) {
    html += '<button class="filter-btn' + (r === 'All' ? ' active' : '') + '" data-filter-group="risk" onclick="setDepFilter(this,\'risk\',\'' + esc(r).replace(/'/g, "\\'") + '\')">' + esc(r) + '</button>';
  });
  html += '</div>';

  html += '<div class="table-scroll"><table class="data-table" id="depsTable"><thead><tr>';
  var depCols = ['#','From','To','Dependency','Type','Status','Risk Level','DRI','Notes'];
  depCols.forEach(function(col, idx) {
    html += '<th onclick="sortDeps(' + idx + ')" data-col="' + idx + '">' + esc(col) + ' <span class="sort-arrow">⇅</span></th>';
  });
  html += '</tr></thead><tbody id="depsBody"></tbody></table></div>';
  html += '<div class="row-counter">Rows loaded: <span class="count-badge">' + data.length + '</span> total | Showing: <span class="count-badge" id="depsShowing">' + data.length + '</span></div>';

  page.innerHTML = html;
  filterDeps();
}

function setDepFilter(btn, group, val) {

  else activeFilters.depsRisk = val;
  btn.closest('.filter-bar').querySelectorAll('.filter-btn[data-filter-group="' + group + '"]').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');

}

// UTILS
function parseDate(str, rawVal) {
  if (!str && !rawVal) return null;
  if (rawVal) {
    var rawStr = String(rawVal);
    var gMatch = rawStr.match(/Date\((\d+),(\d+),(\d+)\)/);
    if (gMatch) return new Date(parseInt(gMatch[1]), parseInt(gMatch[2]), parseInt(gMatch[3]));
  }
  if (!str) return null;
  str = String(str).trim();
  var slashMatch = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (slashMatch) return new Date(parseInt(slashMatch[3]), parseInt(slashMatch[1]) - 1, parseInt(slashMatch[2]));
  var isoMatch = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (isoMatch) return new Date(parseInt(isoMatch[1]), parseInt(isoMatch[2]) - 1, parseInt(isoMatch[3]));
  var d = new Date(str);
  if (!isNaN(d.getTime())) return d;
  return null;
}

function esc(str) {
  var div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}
